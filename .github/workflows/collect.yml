# FR-07: 10분 단위 정적 캐시 갱신. 모크 생성기(실 연동 시 API 어댑터로 교체)를
# 실행해 단일 public/quality_data.json 을 재생성하고 커밋한다. 프론트엔드는
# 라이브 API를 직접 호출하지 않는다 (토큰 노출 0, HTTP 429 회피).
name: Refresh quality_data.json

on:
  schedule:
    - cron: '*/10 * * * *' # 10분 간격 (FR-01 그리드)
  workflow_dispatch: {}

concurrency:
  group: refresh-quality-data
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24 # .ts 직접 실행(타입 스트리핑)

      - name: Generate quality_data.json
        env:
          # 실 연동용 자격증명은 저장소/Actions 시크릿에만 존재 (NFR 마스킹).
          # 시크릿 부재 시 시뮬레이션 모드로 동작.
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          MLAB_BQ_KEY: ${{ secrets.MLAB_BQ_KEY }}
          MLAB_BQ_PROJECT: ${{ secrets.MLAB_BQ_PROJECT }}
          RIPE_ATLAS_KEY: ${{ secrets.RIPE_ATLAS_KEY }}
        run: node scripts/generate-mock.ts

      - name: Commit refreshed cache
        run: |
          git config user.name "quality-bot"
          git config user.email "quality-bot@users.noreply.github.com"
          git add public/quality_data.json
          if git diff --cached --quiet; then
            echo "No data changes."
          else
            git commit -m "chore(data): 10-min quality refresh [skip ci]"
            git push
          fi
